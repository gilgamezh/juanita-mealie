<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>juanita</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; color: #222; }
    h1 { font-size: 1.4rem; }
    form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    input[type=url] { flex: 1; padding: 0.5rem; font-size: 1rem; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
    button:disabled { cursor: default; opacity: 0.6; }
    #result { margin-bottom: 1.5rem; min-height: 1.5rem; }
    .status-queued, .status-running { color: #946200; }
    .status-done { color: #1a7f37; }
    .status-error { color: #b3261e; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid #ddd; }
    a { color: #0a5cc2; }
  </style>
</head>
<body>
  <h1>juanita</h1>
  <form id="submit-form">
    <input type="url" id="url" name="url" placeholder="https://youtu.be/..." required autofocus>
    <button type="submit">Import</button>
  </form>
  <div id="result"></div>

  <h2>Recent</h2>
  <table>
    <thead><tr><th>URL</th><th>Status</th><th>Recipe</th></tr></thead>
    <tbody id="recent-jobs">
      {% for job in jobs %}
      <tr>
        <td>{{ job.url }}</td>
        <td class="status-{{ job.status }}">{{ job.status }}</td>
        <td>
          {% if job.mealie_link %}<a href="{{ job.mealie_link }}">{{ job.recipe_name or job.mealie_link }}</a>
          {% elif job.error %}{{ job.error }}
          {% else %}&mdash;{% endif %}
        </td>
      </tr>
      {% else %}
      <tr><td colspan="3">No imports yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>

  <script>
    const form = document.getElementById("submit-form");
    const result = document.getElementById("result");
    const urlInput = document.getElementById("url");
    const submitButton = form.querySelector("button");

    function render(job) {
      if (job.status === "done") {
        result.innerHTML = `<span class="status-done">Done:</span> ` +
          `<a href="${job.mealie_link}">${job.recipe_name}</a>`;
      } else if (job.status === "error") {
        result.innerHTML = `<span class="status-error">Failed:</span> ${job.error}`;
      } else {
        result.innerHTML = `<span class="status-${job.status}">${job.status}...</span> ${job.url}`;
      }
    }

    async function poll(id) {
      const res = await fetch(`/jobs/${id}`);
      const job = await res.json();
      render(job);
      if (job.status === "queued" || job.status === "running") {
        setTimeout(() => poll(id), 2000);
      } else {
        submitButton.disabled = false;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitButton.disabled = true;
      const res = await fetch("/jobs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: urlInput.value }),
      });
      if (!res.ok) {
        result.innerHTML = `<span class="status-error">Failed:</span> ${(await res.json()).detail}`;
        submitButton.disabled = false;
        return;
      }
      const { id } = await res.json();
      urlInput.value = "";
      poll(id);
    });
  </script>
</body>
</html>
